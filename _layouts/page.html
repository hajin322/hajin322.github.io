---
layout: default
---
<article class="page">
  {% if page.show_title %}
    <header class="page-head">
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}<p class="page-sub">{{ page.subtitle }}</p>{% endif %}
    </header>
  {% endif %}
  <div class="page-body">
    {{ content }}
  </div>
</article>
